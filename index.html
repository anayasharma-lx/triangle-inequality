<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Triangle Inequality</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --paper:#fdfaf4;
  --ink:#1f1b17;--ink2:#5d5348;--ink3:#9a8d7d;
  --rule:#ddd3c4;
  --red:#c45743;--blue:#3b72cf;--green:#2f8f53;
  --sans:'DM Sans',sans-serif;--mono:'DM Mono',monospace;--serif:'Fraunces',serif
}
html,body{width:100%;height:100%;overflow:hidden;background:var(--paper);font-family:var(--sans);color:var(--ink)}

.shell{display:grid;grid-template-columns:252px 1fr;height:100vh}

/* ── sidebar ── */
.sidebar{
  background:linear-gradient(175deg,#f9f4eb 0%,#f1e8d6 100%);
  border-right:1px solid var(--rule);
  display:flex;flex-direction:column;overflow:hidden;position:relative;
}
.sidebar::before{
  content:'';position:absolute;inset:0;pointer-events:none;
  background:linear-gradient(to bottom,rgba(255,255,255,.55) 0%,transparent 30%);
}
.sb-hdr{
  padding:22px 20px 17px;border-bottom:1px solid var(--rule);
  position:relative;z-index:2;
}
.sb-eyebrow{
  display:flex;align-items:center;gap:7px;
  font-family:var(--mono);font-size:9px;letter-spacing:.18em;
  text-transform:uppercase;color:var(--ink3);margin-bottom:8px;
}
.sb-eyebrow::before{content:'';width:14px;height:1.5px;background:currentColor;opacity:.5}
.sb-title{font-family:var(--serif);font-size:24px;line-height:1.05;letter-spacing:-.03em;font-weight:600}
.sb-sub{margin-top:5px;color:var(--ink3);font-size:11.5px;font-style:italic}

.sb-body{
  flex:1;overflow-y:auto;overflow-x:hidden;
  padding:14px 16px 20px;
  display:flex;flex-direction:column;gap:10px;
  position:relative;z-index:1;
}

/* ── slider blocks ── */
.block{
  display:flex;flex-direction:column;gap:9px;
  padding:12px 13px 11px;border-radius:13px;
  border:1px solid rgba(0,0,0,.06);
  background:rgba(255,255,255,.50);
  transition:box-shadow .18s,transform .18s;
}
.block:hover{box-shadow:0 5px 16px rgba(0,0,0,.07);transform:translateY(-1px)}
.block-a{background:linear-gradient(110deg,rgba(196,87,67,.10) 0%,rgba(255,255,255,.52) 44%)}
.block-b{background:linear-gradient(110deg,rgba(59,114,207,.10) 0%,rgba(255,255,255,.52) 44%)}
.block-c{background:linear-gradient(110deg,rgba(47,143,83,.10) 0%,rgba(255,255,255,.52) 44%)}
.row{display:flex;align-items:center;gap:9px}
.swatch{width:5px;height:28px;border-radius:999px;flex-shrink:0}
.lbl{font-family:var(--mono);font-size:10px;font-weight:500;letter-spacing:.08em;color:var(--ink3);text-transform:uppercase}
.val{flex:1;font-family:var(--mono);font-size:24px;line-height:1;letter-spacing:-.02em;font-weight:500}
.unit{font-size:9.5px;color:var(--ink3);font-family:var(--mono);letter-spacing:.05em}

/*
  Circle-toggle button (●) per arm.
  Filled + opaque  = reach circle ON.
  Outline + faded  = reach circle OFF.
  Rotation from the colored end is always available regardless of toggle.
*/
.circ-btn{
  width:20px;height:20px;border-radius:50%;
  border:2px solid currentColor;
  background:transparent;
  cursor:pointer;flex-shrink:0;padding:0;
  transition:background .18s,opacity .2s;
  opacity:.30;
}
.circ-btn.on{ background:currentColor; opacity:.78; }
.circ-btn.on::after{
  content:'';display:block;
  width:7px;height:7px;border-radius:50%;
  background:rgba(255,255,255,.55);
  margin:4.5px auto 0;
}

/* ── sliders ── */
.sl{
  width:100%;appearance:none;height:4px;border-radius:999px;
  background:linear-gradient(to right,var(--fc) var(--pct),rgba(0,0,0,.11) var(--pct));
  outline:none;cursor:pointer;
}
.sl::-webkit-slider-thumb{
  appearance:none;width:17px;height:17px;border-radius:50%;
  border:2.5px solid #fff;background:var(--fc);
  box-shadow:0 2px 8px rgba(0,0,0,.22),0 0 0 3px rgba(255,255,255,.4);
  cursor:pointer;transition:transform .12s;
}
.sl::-webkit-slider-thumb:hover{transform:scale(1.18)}
.sl::-moz-range-thumb{width:17px;height:17px;border:2.5px solid #fff;border-radius:50%;background:var(--fc)}
.sla{--fc:var(--red)}.slb{--fc:var(--blue)}.slc{--fc:var(--green)}

.div{height:1px;background:linear-gradient(to right,transparent,var(--rule) 25%,var(--rule) 75%,transparent)}

/* ── verdict ── */
.verdict{
  margin-top:auto;padding:15px 14px;border-radius:13px;
  border:1.5px solid rgba(0,0,0,.06);
  background:rgba(255,255,255,.52);
  text-align:center;font-family:var(--serif);
  line-height:1.35;font-size:17px;
  transition:all .25s;
  box-shadow:0 2px 10px rgba(0,0,0,.04);
}
.verdict.ok{
  background:rgba(47,143,83,.10);border-color:rgba(47,143,83,.28);
  color:#185230;transform:scale(1.015);
  box-shadow:0 5px 22px rgba(47,143,83,.14);
}
.verdict.no{
  background:rgba(196,87,67,.09);border-color:rgba(196,87,67,.22);
  color:#7a2518;
}
.reset{
  margin-top:10px;width:100%;padding:9px;border-radius:10px;
  border:1px solid rgba(0,0,0,.07);
  background:rgba(255,255,255,.42);
  cursor:pointer;font-weight:600;font-size:12.5px;
  color:var(--ink2);transition:.15s;
}
.reset:hover{background:white;color:var(--ink)}

/* ── canvas area ── */
.main{display:flex;flex-direction:column;overflow:hidden}
.hint{
  padding:9px 18px;border-bottom:1px solid var(--rule);
  font-size:11.5px;color:var(--ink2);
  background:rgba(255,255,255,.75);backdrop-filter:blur(10px);z-index:2;
  display:flex;align-items:center;gap:14px;flex-wrap:wrap;
}
.htag{display:inline-flex;align-items:center;gap:5px}
.htag strong{font-weight:600;color:var(--ink)}
/* black dot legend */
.hpin{
  display:inline-flex;align-items:center;gap:6px;
}
.hpin-dot{
  width:10px;height:10px;border-radius:50%;flex-shrink:0;
}
.hpin-dot.black{background:#1a1510;}
.hpin-dot.color{background:white;border:2px solid var(--ink2);box-sizing:border-box;}
.hsep{opacity:.22}
#cvs{width:100%;height:100%;display:block;touch-action:none;cursor:grab}
#cvs:active{cursor:grabbing}

@media(max-width:760px){
  html,body{overflow:auto;height:auto}
  .shell{grid-template-columns:1fr;height:auto;min-height:100vh}
  .sidebar{border-right:none;border-bottom:1px solid var(--rule)}
  .main{height:70vh}
}
</style>
</head>
<body>
<div class="shell">

  <div class="sidebar">
    <div class="sb-hdr">
      <div class="sb-eyebrow">Geometry · Discovery</div>
      <div class="sb-title">Triangle Inequality</div>
      <div class="sb-sub">Can these lengths form a triangle?</div>
    </div>

    <div class="sb-body">

      <div class="block block-a">
        <div class="row">
          <div class="swatch" style="background:var(--red)"></div>
          <div class="lbl">Side a</div>
          <div class="val" id="va">5</div>
          <div class="unit">units</div>
          <button class="circ-btn" id="cb0" onclick="toggleCircle(0)"
                  style="color:var(--red)" title="Toggle reach circle"></button>
        </div>
        <input id="sa" class="sl sla" type="range" min="1" max="12" step="0.5" value="5">
      </div>

      <div class="block block-b">
        <div class="row">
          <div class="swatch" style="background:var(--blue)"></div>
          <div class="lbl">Side b</div>
          <div class="val" id="vb">5</div>
          <div class="unit">units</div>
          <button class="circ-btn" id="cb1" onclick="toggleCircle(1)"
                  style="color:var(--blue)" title="Toggle reach circle"></button>
        </div>
        <input id="sb" class="sl slb" type="range" min="1" max="12" step="0.5" value="5">
      </div>

      <div class="block block-c">
        <div class="row">
          <div class="swatch" style="background:var(--green)"></div>
          <div class="lbl">Side c</div>
          <div class="val" id="vc">5</div>
          <div class="unit">units</div>
          <button class="circ-btn" id="cb2" onclick="toggleCircle(2)"
                  style="color:var(--green)" title="Toggle reach circle"></button>
        </div>
        <input id="sc" class="sl slc" type="range" min="1" max="12" step="0.5" value="5">
      </div>

      <div class="div"></div>

      <div class="verdict" id="verdict">Arrange the sticks to form a triangle</div>
      <button class="reset" onclick="resetAll()">↺  Reset positions</button>

    </div>
  </div>

  <div class="main">
    <div class="hint">
      <span class="hpin">
        <span class="hpin-dot black"></span>Fixed pivot — drag to <strong>move</strong>
      </span>
      <span class="hsep">·</span>
      <span class="hpin">
        <span class="hpin-dot color"></span>Free end — drag to <strong>rotate</strong>
      </span>
      <span class="hsep">·</span>
      <span class="htag"><strong>●</strong> toggles reach circle</span>
    </div>
    <canvas id="cvs"></canvas>
  </div>

</div>
<script>
const cvs=document.getElementById('cvs');
const ctx=cvs.getContext('2d');
const DPR=Math.min(devicePixelRatio||1,2);

/*
  p0 = BLACK fixed pivot.
       • Reach circle centred here.
       • Cannot be dragged to rotate (dragging near p0 triggers body move).
       • Moves with the arm when the arm body is dragged.
  p1 = COLORED free end.
       • Dragging it rotates the arm around p0.
       • Always rotatable (circle toggle does not affect this).
*/

const STICK_W=6, END_R=7, HIT=22, BODY_HIT=16, CLOSE=18;
const cols=['#c45743','#3b72cf','#2f8f53'];

let lens=[5,5,5];
let sticks=[];
let drag=null;
let circleVisible=[false,false,false];  /* per-arm circle toggle — off by default */

function ppu(){return Math.max(30,Math.min(54,W()/18))}
function W(){return cvs.width/DPR}
function H(){return cvs.height/DPR}

/* ─── reset ─── */

function resetAll(){
  const s=ppu();
  sticks=[
    {p0:{x:W()*.18,y:H()*.50},p1:{x:W()*.18+lens[0]*s,y:H()*.50}},
    {p0:{x:W()*.42,y:H()*.30},p1:{x:W()*.42+lens[1]*s,y:H()*.30}},
    {p0:{x:W()*.42,y:H()*.70},p1:{x:W()*.42+lens[2]*s,y:H()*.70}}
  ];
  draw();updateVerdict();
}

/* ─── draw ─── */

function draw(){
  ctx.clearRect(0,0,W(),H());
  drawBG();
  drawConstruction();          /* circles sit behind sticks */

  const tri=triangle();
  if(tri.ok){
    ctx.beginPath();
    ctx.moveTo(tri.a.x,tri.a.y);ctx.lineTo(tri.b.x,tri.b.y);ctx.lineTo(tri.c.x,tri.c.y);
    ctx.closePath();
    ctx.fillStyle='rgba(47,143,83,.16)';ctx.fill();
    ctx.strokeStyle='rgba(47,143,83,.50)';ctx.lineWidth=2;ctx.stroke();
  }

  sticks.forEach((s,i)=>drawStick(s,i));
}

function drawBG(){
  ctx.fillStyle='#fdfaf4';
  ctx.fillRect(0,0,W(),H());
  ctx.fillStyle='rgba(140,115,78,.17)';
  for(let x=32;x<W();x+=32)
    for(let y=32;y<H();y+=32){
      ctx.beginPath();ctx.arc(x,y,1.2,0,Math.PI*2);ctx.fill();
    }
  const vg=ctx.createRadialGradient(W()/2,H()/2,Math.min(W(),H())*.28,W()/2,H()/2,Math.max(W(),H())*.82);
  vg.addColorStop(0,'rgba(0,0,0,0)');vg.addColorStop(1,'rgba(20,12,4,.05)');
  ctx.fillStyle=vg;ctx.fillRect(0,0,W(),H());
}

/*
  Circle rendering rules (visible circles only):
  ① Near-same pivot (< NEAR px) → ONE neutral thin solid circle per unique radius.
  ② Geometrically overlapping (different pivots) → thin solid colored line.
  ③ Isolated → normal dashed colored circle with subtle fill.
*/
function drawConstruction(){
  const rs=lens.map(l=>l*ppu());
  const N=sticks.length;
  const NEAR=26;

  /* overlap check among visible circles */
  const overlaps=new Array(N).fill(false);
  for(let i=0;i<N;i++){
    if(!circleVisible[i]) continue;
    for(let j=i+1;j<N;j++){
      if(!circleVisible[j]) continue;
      if(dist(sticks[i].p0,sticks[j].p0)<rs[i]+rs[j]){
        overlaps[i]=true;overlaps[j]=true;
      }
    }
  }

  const drawn=new Set();
  for(let i=0;i<N;i++){
    if(!circleVisible[i]||drawn.has(i)) continue;

    const grp=[i];
    for(let j=i+1;j<N;j++){
      if(circleVisible[j]&&!drawn.has(j)&&dist(sticks[i].p0,sticks[j].p0)<NEAR)
        grp.push(j);
    }
    grp.forEach(k=>drawn.add(k));

    if(grp.length>1){
      /* ① same pivot → one neutral thin solid circle per unique radius */
      const cx=grp.reduce((s,k)=>s+sticks[k].p0.x,0)/grp.length;
      const cy=grp.reduce((s,k)=>s+sticks[k].p0.y,0)/grp.length;
      const seenR=new Set();
      grp.forEach(k=>{
        const rk=Math.round(rs[k]);
        if(seenR.has(rk)) return;
        seenR.add(rk);
        ctx.beginPath();
        ctx.arc(cx,cy,rs[k],0,Math.PI*2);
        ctx.strokeStyle='rgba(50,40,30,.30)';
        ctx.lineWidth=1.0;
        ctx.stroke();
      });

    } else if(overlaps[i]){
      /* ② overlapping, different pivots → thin solid colored */
      ctx.beginPath();
      ctx.arc(sticks[i].p0.x,sticks[i].p0.y,rs[i],0,Math.PI*2);
      ctx.strokeStyle=cols[i]+'aa';
      ctx.lineWidth=1.0;
      ctx.stroke();

    } else {
      /* ③ isolated → dashed colored */
      const st=sticks[i],r=rs[i],c=cols[i];
      ctx.beginPath();ctx.arc(st.p0.x,st.p0.y,r,0,Math.PI*2);
      ctx.fillStyle=c+'0e';ctx.fill();
      ctx.beginPath();ctx.arc(st.p0.x,st.p0.y,r,0,Math.PI*2);
      ctx.setLineDash([10,6]);
      ctx.strokeStyle=c+'99';ctx.lineWidth=1.8;ctx.stroke();
      ctx.setLineDash([]);
    }
  }
}

function drawStick(st,i){
  const c=cols[i];
  const {p0,p1}=st;
  const dx=p1.x-p0.x, dy=p1.y-p0.y;
  const len=Math.hypot(dx,dy)||1;

  /* ── body with shadow ── */
  ctx.save();
  ctx.shadowColor='rgba(0,0,0,.20)';
  ctx.shadowBlur=10;ctx.shadowOffsetY=4;
  ctx.beginPath();
  ctx.moveTo(p0.x,p0.y);ctx.lineTo(p1.x,p1.y);
  ctx.strokeStyle=c;ctx.lineWidth=STICK_W;ctx.lineCap='round';ctx.stroke();
  ctx.restore();

  /* ── p0 — black fixed pivot ── */
  /* outer white ring */
  ctx.beginPath();ctx.arc(p0.x,p0.y,END_R+3,0,Math.PI*2);
  ctx.fillStyle='rgba(255,255,255,.92)';ctx.fill();
  /* black fill */
  ctx.beginPath();ctx.arc(p0.x,p0.y,END_R+1,0,Math.PI*2);
  ctx.fillStyle='#1a1510';ctx.fill();
  /* small white center dot — signals "pivot" */
  ctx.beginPath();ctx.arc(p0.x,p0.y,2.8,0,Math.PI*2);
  ctx.fillStyle='rgba(255,255,255,.70)';ctx.fill();

  /* ── p1 — colored free end ── */
  /* outer white ring */
  ctx.beginPath();ctx.arc(p1.x,p1.y,END_R+3,0,Math.PI*2);
  ctx.fillStyle='rgba(255,255,255,.92)';ctx.fill();
  /* colored fill */
  ctx.beginPath();ctx.arc(p1.x,p1.y,END_R+1,0,Math.PI*2);
  ctx.fillStyle=c;ctx.fill();
  /* inner white ring to distinguish from pivot */
  ctx.beginPath();ctx.arc(p1.x,p1.y,END_R-2,0,Math.PI*2);
  ctx.strokeStyle='rgba(255,255,255,.55)';ctx.lineWidth=2;ctx.stroke();

  /* ── length label ── */
  const m=mid(p0,p1);
  let nx=-dy/len, ny=dx/len;
  if(ny>0){nx=-nx;ny=-ny;}
  const lx=m.x+nx*20, ly=m.y+ny*20;
  ctx.save();
  ctx.font='600 14px "DM Sans"';
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.strokeStyle='rgba(253,250,244,.96)';
  ctx.lineWidth=5;ctx.lineJoin='round';
  ctx.strokeText(lens[i],lx,ly);
  ctx.fillStyle='#1a1510';
  ctx.fillText(lens[i],lx,ly);
  ctx.restore();
}

/* ─── logic ─── */

function triangle(){
  const P=sticks.map(s=>[s.p0,s.p1]);
  for(let i=0;i<2;i++) for(let j=0;j<2;j++) for(let k=0;k<2;k++){
    const d0=dist(P[0][i],P[1][j]);
    const d1=dist(P[0][1-i],P[2][k]);
    const d2=dist(P[1][1-j],P[2][1-k]);
    if(d0<CLOSE&&d1<CLOSE&&d2<CLOSE)
      return{ok:true,
        a:mid(P[0][i],P[1][j]),
        b:mid(P[0][1-i],P[2][k]),
        c:mid(P[1][1-j],P[2][1-k])};
  }
  return{ok:false};
}

function updateVerdict(){
  const el=document.getElementById('verdict');
  if(triangle().ok){
    el.textContent='Triangle formed! ✓';el.className='verdict ok';return;
  }
  if(canForm()){
    el.textContent='These lengths can form a triangle';el.className='verdict';
  }else{
    el.textContent='These lengths cannot form a triangle';el.className='verdict no';
  }
}

function canForm(){const[a,b,c]=lens;return a+b>c&&a+c>b&&b+c>a}

/* ─── interaction ─── */

function hit(pt){
  for(let i=sticks.length-1;i>=0;i--){
    const s=sticks[i];

    /*
      p0 is the BLACK pivot — it NEVER triggers a rotation hit.
      Clicking near p0 falls through to the body-drag check below.

      p1 is the COLORED free end — always rotatable (sweeps around p0).
      Circle toggle does NOT affect rotation ability.
    */
    if(dist(pt,s.p1)<HIT)
      return{i,type:'p1',pivot:s.p0,len:dist(s.p0,s.p1)};

    /* body drag — always available, and catches clicks near p0 too */
    if(segDist(pt,s.p0,s.p1)<BODY_HIT)
      return{i,type:'body',
        o0:{x:pt.x-s.p0.x,y:pt.y-s.p0.y},
        o1:{x:pt.x-s.p1.x,y:pt.y-s.p1.y}};
  }
  return null;
}

function start(e){const p=ptE(e),h=hit(p);if(h)drag=h}

function move(e){
  if(!drag)return;
  e.preventDefault();
  const p=ptE(e),s=sticks[drag.i];
  if(drag.type==='body'){
    /* move entire arm — p0 stays fixed relative to grab point */
    s.p0={x:p.x-drag.o0.x,y:p.y-drag.o0.y};
    s.p1={x:p.x-drag.o1.x,y:p.y-drag.o1.y};
  }else{
    /* p1 drag — rotate around the fixed pivot p0 */
    const a=Math.atan2(p.y-drag.pivot.y,p.x-drag.pivot.x);
    s.p1={x:drag.pivot.x+Math.cos(a)*drag.len,y:drag.pivot.y+Math.sin(a)*drag.len};
    s.p0=drag.pivot;  /* keep p0 exactly where it was */
  }
  draw();updateVerdict();
}

function end(){drag=null}

/* ─── circle toggle ─── */

function toggleCircle(i){
  circleVisible[i]=!circleVisible[i];
  document.getElementById('cb'+i).classList.toggle('on',circleVisible[i]);
  draw();
}

/* ─── sliders ─── */

function fill(id){
  const sl=document.getElementById('s'+id);
  sl.style.setProperty('--pct',((sl.value-1)/(12-1))*100+'%');
}

['a','b','c'].forEach((id,i)=>{
  fill(id);
  document.getElementById('s'+id).addEventListener('input',e=>{
    lens[i]=+e.target.value;
    document.getElementById('v'+id).textContent=lens[i];
    fill(id);
    const s=sticks[i];
    const a=Math.atan2(s.p1.y-s.p0.y,s.p1.x-s.p0.x);
    s.p1={x:s.p0.x+Math.cos(a)*lens[i]*ppu(),y:s.p0.y+Math.sin(a)*lens[i]*ppu()};
    draw();updateVerdict();
  });
});

/* ─── resize ─── */

function resize(){
  const area=document.querySelector('.main');
  const hh=document.querySelector('.hint').offsetHeight;
  const w=area.clientWidth,h=area.clientHeight-hh;
  cvs.style.width=w+'px';cvs.style.height=h+'px';
  cvs.width=w*DPR;cvs.height=h*DPR;
  ctx.setTransform(DPR,0,0,DPR,0,0);
  resetAll();
}

/* ─── helpers ─── */

function dist(a,b){return Math.hypot(a.x-b.x,a.y-b.y)}
function mid(a,b){return{x:(a.x+b.x)/2,y:(a.y+b.y)/2}}
function segDist(p,a,b){
  const dx=b.x-a.x,dy=b.y-a.y,l=dx*dx+dy*dy;
  let t=((p.x-a.x)*dx+(p.y-a.y)*dy)/l;
  t=Math.max(0,Math.min(1,t));
  return dist(p,{x:a.x+t*dx,y:a.y+t*dy});
}
function ptE(e){
  const r=cvs.getBoundingClientRect(),s=e.touches?e.touches[0]:e;
  return{x:(s.clientX-r.left)*(cvs.width/DPR)/r.width,
         y:(s.clientY-r.top)*(cvs.height/DPR)/r.height};
}

/* ─── init ─── */

cvs.addEventListener('mousedown',start);
window.addEventListener('mousemove',move);
window.addEventListener('mouseup',end);
cvs.addEventListener('touchstart',start,{passive:false});
window.addEventListener('touchmove',move,{passive:false});
window.addEventListener('touchend',end);
window.addEventListener('resize',resize);

resize();
